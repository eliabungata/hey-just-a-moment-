<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>For Misoji</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --forest-teal: #163832; /* Deep pine script color from image_274981.png */
    --leaf-teal:   #2c5d54; /* Medium foliage tint */
    --soft-amber:  #d9a076; /* Organic floral accent from the card illustration */
    --warm-cream:  #f9f7f4; /* Tactile eggshell stationery stock */
    --deeptext:    #112925; 
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    /* NATURAL LIGHT ENGINE: Cycles like shifting sunlight over wood */
    background: linear-gradient(-45deg, #f7f3ed, #f0e9df, #e8e0d5, #f3ede2);
    background-size: 400% 400%;
    animation: sunlightShift 25s ease infinite;
    color: var(--deeptext);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  @keyframes sunlightShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ── CANVASES ── */
  canvas { position: fixed; inset: 0; pointer-events: none; }
  #bgCanvas { z-index: 0; }
  #nebulaCanvas { z-index: 1; }
  #ptCanvas { z-index: 2; }
  #interactiveCanvas { z-index: 11; } 

  /* ── BOTANICAL AMBIENT CLOUDS ── */
  .aurora {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    border-radius: 50%;
    filter: blur(140px);
    mix-blend-mode: multiply;
    opacity: 0.35; 
  }
  .au1 {
    width: min(700px,130vw); height: min(350px,60vw);
    background: linear-gradient(135deg, rgba(44,93,84,0.15), rgba(217,160,118,0.1), transparent);
    top: -40px; left: -40px;
  }
  .au2 {
    width: min(600px,120vw); height: min(300px,55vw);
    background: linear-gradient(225deg, rgba(22,56,50,0.08), rgba(249,247,244,0.4), transparent);
    bottom: -40px; right: -40px;
  }

  /* ── RINGS ── */
  .ring {
    position: fixed;
    width: min(420px,90vw); height: min(420px,90vw);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%) scale(0);
    z-index: 2;
    pointer-events: none;
  }
  .ring:nth-child(1){ border:1px solid rgba(44,93,84,0.18); animation:ring 12s 0.5s ease-out infinite; }
  .ring:nth-child(2){ border:1px solid rgba(217,160,118,0.15); animation:ring 12s 5.5s ease-out infinite; }
  @keyframes ring {
    0%  { transform:translate(-50%,-50%) scale(0.4); opacity:0.8; }
    100%{ transform:translate(-50%,-50%) scale(2.8); opacity:0; }
  }

  /* ── CORNERS ── */
  .corner {
    position: fixed; width:44px; height:44px;
    pointer-events:none; z-index:6; opacity:0;
    transition: opacity 1.5s 2s ease;
  }
  .corner svg { width:100%; height:100%; }
  .c-tl { top:25px; left:25px; }
  .c-tr { top:25px; right:25px; transform:scaleX(-1); }
  .c-bl { bottom:25px; left:25px; transform:scaleY(-1); }
  .c-br { bottom:25px; right:25px; transform:scale(-1,-1); }
  @media(max-width:400px){ .corner{ display:none; } }

  /* ── CARD ── */
  .card {
    position:relative; z-index:10; text-align:center;
    width: min(750px,94vw);
    padding: clamp(2.5rem,7vw,5rem) clamp(2rem,6vw,4.5rem);
    background: rgba(249, 247, 244, 0.88); 
    border-radius: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(44, 93, 84, 0.12);
    box-shadow: 0 25px 60px rgba(54, 48, 42, 0.08);
  }

  .eyebrow {
    font-size: clamp(0.85rem, 2.5vw, 1.05rem);
    font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--leaf-teal); 
    opacity: 0; transform: translateY(14px);
    transition: opacity 0.9s ease, transform 0.9s ease;
    margin-bottom: clamp(1.5rem, 5vw, 2.5rem);
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 14vw, 7.5rem);
    font-weight: 700; line-height: 1.05; 
    color: var(--forest-teal);
    opacity: 0; transform: translateY(18px);
    transition: opacity 1s 0.2s ease, transform 1s 0.2s ease;
    margin-bottom: 0.3rem;
  }
  .headline em {
    font-style: italic; font-weight: 700;
    background: linear-gradient(90deg, var(--forest-teal), var(--soft-amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* DIVIDER */
  .divider {
    position: relative; height: 1px; 
    margin: clamp(2rem, 5vw, 3rem) auto;
    width: 0; max-width: 260px;
    background: linear-gradient(90deg, transparent, rgba(22,56,50,0.3), rgba(217,160,118,0.4), transparent);
    transition: width 1.3s 0.6s cubic-bezier(0.22,1,0.36,1);
  }
  .divider.open { width: 260px; }

  /* MESSAGE */
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 5.5vw, 2.6rem);
    font-weight: 400;
    font-style: italic; line-height: 1.6;
    color: rgba(22, 56, 50, 0.72); 
    margin-bottom: 0px;
    word-spacing: normal; letter-spacing: 0.01em;
    transition: margin 0.5s ease, color 0.5s ease;
  }
  .message.expanded {
    margin-bottom: clamp(2.5rem, 6vw, 3.5rem);
    color: var(--deeptext); 
  }
  .w {
    display: inline; opacity: 0; filter: blur(3px);
    transition: opacity 0.5s ease, filter 0.5s ease;
  }
  .w.on  { opacity: 1; filter: blur(0); }
  .w.str {
    font-style: normal; font-weight: 700;
    background: linear-gradient(90deg, var(--forest-teal), var(--soft-amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* HIDDEN WRAPPER CONTAINER */
  .hidden-content {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 1s ease;
  }
  .hidden-content.reveal {
    max-height: 500px;
    opacity: 1;
  }

  /* WISH */
  .wish {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 6.5vw, 3.5rem);
    font-weight: 700;
    background: linear-gradient(120deg, var(--forest-teal), var(--soft-amber), var(--leaf-teal), var(--forest-teal));
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 7s linear infinite;
    margin-bottom: 0.5rem; line-height: 1.4;
  }
  @keyframes shimmer { to { background-position: 300% center; } }

  /* NAME */
  .namesign {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.5rem, 8vw, 4.2rem);
    font-style: italic; font-weight: 700;
    background: linear-gradient(90deg, var(--forest-teal), var(--soft-amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: clamp(1.8rem, 4.5vw, 2.5rem);
    letter-spacing: 0.04em;
  }

  /* NOTE */
  .note {
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
    font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--soft-amber);
  }

  /* HIGH ATTENTION PROMPT BUTTON MATCHING THE FOREST ORGANIC COLORS */
  .action-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: linear-gradient(135deg, #0e2420, var(--forest-teal), var(--leaf-teal), #0e2420);
    background-size: 300% 100%;
    color: #ffffff;
    border: none;
    padding: 18px 38px;
    font-size: 0.85rem;
    font-weight: 900;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border-radius: 50px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(25px);
    transition: opacity 0.8s ease, transform 0.8s ease, box-shadow 0.4s, background 0.4s;
    outline: none;
    margin-top: clamp(2.5rem, 6vw, 3.5rem);
    -webkit-tap-highlight-color: transparent;
    animation: botanical-pulse 2.2s infinite ease-in-out, gradientFluid 5s linear infinite;
  }
  
  @keyframes gradientFluid {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }
  
  .action-btn .smiley {
    font-size: 1.35rem;
    letter-spacing: normal;
    display: inline-block;
    animation: smiley-nod 1.2s infinite alternate ease-in-out;
  }
  
  .action-btn span.arrow {
    display: inline-block;
    font-weight: 900;
    animation: arrow-slide 0.8s infinite alternate ease-in-out;
  }
  
  .action-btn:hover {
    box-shadow: 0 20px 40px rgba(22, 56, 50, 0.25), 0 0 20px rgba(217, 160, 118, 0.3);
    transform: translateY(-2px) scale(1.02);
  }
  
  @keyframes botanical-pulse {
    0% { 
      transform: scale(1); 
      box-shadow: 0 10px 25px rgba(22, 56, 50, 0.15), 0 0 0px rgba(217, 160, 118, 0);
    }
    50% { 
      transform: scale(1.04); 
      box-shadow: 0 15px 35px rgba(22, 56, 50, 0.25), 0 0 15px rgba(217, 160, 118, 0.2);
    }
    100% { 
      transform: scale(1); 
      box-shadow: 0 10px 25px rgba(22, 56, 50, 0.15), 0 0 0px rgba(217, 160, 118, 0);
    }
  }
  @keyframes arrow-slide {
    0% { transform: translateX(0); }
    100% { transform: translateX(6px); }
  }
  @keyframes smiley-nod {
    0% { transform: scale(1) rotate(-4deg); }
    100% { transform: scale(1.15) rotate(6deg); }
  }

  .show { opacity: 1 !important; transform: none !important; }
  .hide-btn { opacity: 0 !important; transform: scale(0.5) !important; pointer-events: none !important; margin-top: 0px !important; height: 0px !important; padding: 0px !important; border: none !important; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="nebulaCanvas"></canvas>
<canvas id="ptCanvas"></canvas>
<canvas id="interactiveCanvas"></canvas>

<div class="aurora au1"></div>
<div class="aurora au2"></div>

<div class="ring"></div>
<div class="ring"></div>

<div class="corner c-tl"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(44,93,84,0.3)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(44,93,84,0.5)"/></svg></div>
<div class="corner c-tr"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(217,160,118,0.3)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(44,93,84,0.5)"/></svg></div>
<div class="corner c-bl"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(217,160,118,0.3)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(44,93,84,0.5)"/></svg></div>
<div class="corner c-br"><svg viewBox="0 0 48 48" fill="none"><path d="M3 45L3 3L45 3" stroke="rgba(44,93,84,0.3)" stroke-width="1.5"/><circle cx="3" cy="3" r="2" fill="rgba(44,93,84,0.5)"/></svg></div>

<div class="card">
  <p class="eyebrow" id="ey">a little note, just for </p>
  <h1 class="headline" id="hl">You <em></em></h1>
  <div class="divider" id="dv"></div>
  <p class="message" id="msg"></p>
  
  <button class="action-btn" id="actBtn" onclick="unlockSmile(event)">
    click to unlock your smile <span class="smiley">😉👍</span><span class="arrow">→</span>
  </button>

  <!-- HIDDEN CONTENT SECTION -->
  <div class="hidden-content" id="secretContent">
    <p class="wish" id="wsh">Wishing you nice exams —</p>
    <span class="namesign" id="nm">Misoji.</span>
    <p class="note" id="nt">you already know more than you think</p>
  </div>
</div>

<script>
/* ── DYNAMIC CONTENT ENGINE (URL PARSER) ── */
const urlParams = new URLSearchParams(window.location.search);

const customName = urlParams.get('name') || "You";
const customHeadline = urlParams.get('headline') || "";
const customWish = urlParams.get('wish') || "Wishing you nice exams —";
const customSign = urlParams.get('sign') || "Misoji.";
const customNote = urlParams.get('note') || "you already know more than you think";
const customMessage = urlParams.get('message') || "You've already proven you know how to find your way through.*This exam is no different.";

document.getElementById('hl').innerHTML = `${customName} <em>${customHeadline}</em>`;
document.getElementById('wsh').textContent = customWish;
document.getElementById('nm').textContent = customSign;
document.getElementById('nt').textContent = customNote;

/* ── GENERATE TIMED WORD ELEMENTS ── */
const msgEl = document.getElementById('msg');
const allWords = [];
const textLines = customMessage.split('*'); 

textLines.forEach((lineStr, li) => {
  if (li > 0) msgEl.appendChild(document.createElement('br'));
  
  const wordsArray = lineStr.split(' ');
  wordsArray.forEach((wordText, wi) => {
    if (wi > 0) msgEl.appendChild(document.createTextNode(' '));
    
    const span = document.createElement('span');
    span.className = 'w' + (li === textLines.length - 1 ? ' str' : '');
    span.textContent = wordText;
    msgEl.appendChild(span);
    allWords.push(span);
  });
});

/* ── CANVAS SETUP & PROPERTIES ── */
const bgC = document.getElementById('bgCanvas');
const bgX = bgC.getContext('2d');
const nbC = document.getElementById('nebulaCanvas');
const nbX = nbC.getContext('2d');
const ptC = document.getElementById('ptCanvas');
const ptX = ptC.getContext('2d');
const intC = document.getElementById('interactiveCanvas');
const intX = intC.getContext('2d');

let mouse = { x: -1000, y: -1000, active: false, px: -1000, py: -1000, vx: 0, vy: 0 };

function resize() {
  bgC.width = nbC.width = ptC.width = intC.width = window.innerWidth;
  bgC.height = nbC.height = ptC.height = intC.height = window.innerHeight;
  drawNebula();
}
resize();
window.addEventListener('resize', resize);

function drawNebula() {
  nbX.clearRect(0, 0, nbC.width, nbC.height);
  const blobs = [
    { x:0.15, y:0.2,  r:0.4, c:'rgba(44,93,84,0.06)' },
    { x:0.8,  y:0.75, r:0.4, c:'rgba(217,160,118,0.04)' }
  ];
  blobs.forEach(b => {
    const grd = nbX.createRadialGradient(
      b.x * nbC.width, b.y * nbC.height, 0,
      b.x * nbC.width, b.y * nbC.height, b.r * Math.max(nbC.width, nbC.height)
    );
    grd.addColorStop(0, b.c);
    grd.addColorStop(1, 'transparent');
    nbX.fillStyle = grd;
    nbX.fillRect(0, 0, nbC.width, nbC.height);
  });
}

/* ── BACKSTAGE STARFIELD ENTITIES ── */
const starColors = [[22,56,50], [217,160,118], [44,93,84]];
const stars = Array.from({length:75}, () => {
  const col = starColors[Math.floor(Math.random() * starColors.length)];
  return {
    x:  Math.random() * window.innerWidth,
    y:  Math.random() * window.innerHeight,
    ox: 0, oy: 0, 
    r:  Math.random() * 1.5 + 0.6,
    op: Math.random() * 0.35 + 0.2,
    sp: Math.random() * 0.005 + 0.002,
    ph: Math.random() * Math.PI * 2,
    col
  };
});

function drawStars(t) {
  bgX.clearRect(0, 0, bgC.width, bgC.height);
  stars.forEach(s => {
    if (mouse.active) {
      const dx = mouse.x - s.x;
      const dy = mouse.y - s.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 180) {
        const force = (180 - dist) / 180;
        s.ox += (mouse.vx * force * 1.1 - s.ox) * 0.08;
        s.oy += (mouse.vy * force * 1.1 - s.oy) * 0.08;
      } else {
        s.ox += (0 - s.ox) * 0.04;
        s.oy += (0 - s.oy) * 0.04;
      }
    } else {
      s.ox += (0 - s.ox) * 0.04;
      s.oy += (0 - s.oy) * 0.04;
    }

    const a = s.op * (0.4 + 0.6 * Math.sin(t * s.sp + s.ph));
    const [r,g,b] = s.col;
    bgX.beginPath();
    bgX.arc(s.x + s.ox, s.y + s.oy, s.r, 0, Math.PI*2);
    bgX.fillStyle = `rgba(${r},${g},${b},${a.toFixed(3)})`;
    bgX.fill();
  });
}

/* ── CONSTANT BACKGROUND FLOATERS ── */
const ptColors = ['rgba(44,93,84,', 'rgba(217,160,118,'];
const syms = ['✦','·','✧'];
const pts = Array.from({length:12}, () => ({
  x:  Math.random() * window.innerWidth,
  y:  Math.random() * window.innerHeight + window.innerHeight,
  sz: Math.random() * 1.6 + 1,
  vy: -(Math.random() * 0.2 + 0.1),
  vx: (Math.random() - 0.5) * 0.06,
  op: Math.random() * 0.3 + 0.15,
  s:  syms[Math.floor(Math.random() * syms.length)],
  col: ptColors[Math.floor(Math.random() * ptColors.length)]
}));

function drawPts() {
  ptX.clearRect(0, 0, ptC.width, ptC.height);
  pts.forEach(p => {
    p.y += p.vy;
    p.x += p.vx;
    if (p.y < -20) { p.y = ptC.height + 20; p.x = Math.random() * ptC.width; }
    ptX.font = `${p.sz * 10}px serif`;
    ptX.fillStyle = p.col + p.op + ')';
    ptX.fillText(p.s, p.x, p.y);
  });
}

/* ── SHOOTING SUNBEAMS ── */
let shoot = null;
function launchShoot() {
  shoot = { x: Math.random() * 0.6, y: Math.random() * 0.3, len: Math.random() * 0.08 + 0.04, speed: Math.random() * 0.003 + 0.002, op: 0.5 };
}
setTimeout(launchShoot, 3000);
setInterval(launchShoot, 14000 + Math.random() * 9000);

function drawShoot() {
  if (!shoot) return;
  shoot.x += shoot.speed;
  shoot.y += shoot.speed * 0.45;
  shoot.op -= 0.012;
  if (shoot.op <= 0) { shoot = null; return; }
  const x1 = shoot.x * bgC.width;
  const y1 = shoot.y * bgC.height;
  const x0 = x1 - shoot.len * bgC.width;
  const y0 = y1 - shoot.len * bgC.height * 0.45;
  const grd = bgX.createLinearGradient(x0, y0, x1, y1);
  grd.addColorStop(0, `rgba(255,255,255,0)`);
  grd.addColorStop(1, `rgba(217,160,118,${shoot.op})`);
  bgX.beginPath();
  bgX.moveTo(x0, y0);
  bgX.lineTo(x1, y1);
  bgX.strokeStyle = grd;
  bgX.lineWidth = 1.2;
  bgX.stroke();
}

/* ── INTERACTIVE LEAF & AMBER TRAIL ── */
let trailParticles = [];
const interactiveGradients = ['rgba(44,93,84,', 'rgba(217,160,118,', 'rgba(22,56,50,'];
const interactiveShapes = ['✦', '✧'];

function trackActivity(nx, ny) {
  if (mouse.px !== -1000) {
    mouse.vx = nx - mouse.px;
    mouse.vy = ny - mouse.py;
  }
  mouse.px = mouse.x = nx;
  mouse.py = mouse.y = ny;
  mouse.active = true;

  const movementSpeed = Math.sqrt(mouse.vx * mouse.vx + mouse.vy * mouse.vy);
  const spawnCount = Math.min(Math.floor(movementSpeed * 0.2) + 1, 2);

  for(let i = 0; i < spawnCount; i++) {
    trailParticles.push({
      x: nx + (Math.random() - 0.5) * 8,
      y: ny + (Math.random() - 0.5) * 8,
      size: Math.max(14 - movementSpeed * 0.2, 6) + Math.random() * 5, 
      vx: (Math.random() - 0.5) * 1.0 + mouse.vx * 0.1,
      vy: (Math.random() - 0.5) * 1.0 - 0.3 + mouse.vy * 0.1, 
      shape: interactiveShapes[Math.floor(Math.random() * interactiveShapes.length)],
      color: interactiveGradients[Math.floor(Math.random() * interactiveGradients.length)],
      alpha: 0.8,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.08
    });
  }
}

/* ── UNLOCK SHOCKWAVE INTERACTION ── */
function unlockSmile(e) {
  e.preventDefault();
  const btn = document.getElementById('actBtn');
  const msg = document.getElementById('msg');
  const secret = document.getElementById('secretContent');
  
  btn.classList.add('hide-btn');
  msg.classList.add('expanded');
  
  const rect = btn.getBoundingClientRect();
  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;

  for (let i = 0; i < 50; i++) {
    const angle = (Math.PI * 2 / 50) * i + (Math.random() - 0.5) * 0.2;
    const speed = Math.random() * 5.0 + 4.0;
    trailParticles.push({
      x: startX,
      y: startY,
      size: Math.random() * 10 + 12,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 0.2,
      shape: interactiveShapes[Math.floor(Math.random() * interactiveShapes.length)],
      color: interactiveGradients[Math.floor(Math.random() * interactiveGradients.length)],
      alpha: 1.0,
      rotation: Math.random() * Math.PI * 2,
      rotationSpeed: (Math.random() - 0.5) * 0.3
    });
  }

  setTimeout(() => {
    secret.classList.add('reveal');
  }, 300);
}

window.addEventListener('mousemove', (e) => trackActivity(e.clientX, e.clientY));
window.addEventListener('touchmove', (e) => {
  if(e.touches.length > 0) trackActivity(e.touches[0].clientX, e.touches[0].clientY);
});
window.addEventListener('mouseleave', () => { mouse.active = false; mouse.px = mouse.py = -1000; });
window.addEventListener('touchend', () => { mouse.active = false; mouse.px = mouse.py = -1000; });

function drawInteractiveTrail() {
  intX.clearRect(0, 0, intC.width, intC.height);
  
  mouse.vx *= 0.92;
  mouse.vy *= 0.92;

  for (let i = trailParticles.length - 1; i >= 0; i--) {
    let p = trailParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.015; 
    p.rotation += p.rotationSpeed;
    
    if (p.alpha <= 0) {
      trailParticles.splice(i, 1);
      continue;
    }
    
    intX.save();
    intX.translate(p.x, p.y);
    intX.rotate(p.rotation);
    intX.font = `${p.size}px Arial`;
    intX.fillStyle = p.color + p.alpha + ')';
    intX.textAlign = 'center';
    intX.textBaseline = 'middle';
    intX.fillText(p.shape, 0, 0);
    intX.restore();
  }
}

/* ── ANIMATION LOOP ── */
let t = 0;
(function loop() {
  t++;
  drawStars(t);
  drawShoot();
  drawPts();
  drawInteractiveTrail();
  requestAnimationFrame(loop);
})();

/* ── STAGED TIMELINE ── */
const $ = id => document.getElementById(id);
setTimeout(() => $('ey').classList.add('show'), 350);
setTimeout(() => $('hl').classList.add('show'), 650);
setTimeout(() => $('dv').classList.add('open'), 1050);
setTimeout(() => document.querySelectorAll('.corner').forEach(c => c.classList.add('show')), 500);

const splitIndex = textLines[0] ? textLines[0].split(' ').length : 0;
allWords.forEach((w, i) => {
  const pause = i >= splitIndex ? 600 : 0;
  setTimeout(() => w.classList.add('on'), 1700 + i * 110 + pause);
});

const buttonDelay = 1700 + allWords.length * 110 + 600 + 400;
setTimeout(() => $('actBtn').classList.add('show'), buttonDelay);
</script>
